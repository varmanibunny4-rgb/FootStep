<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Womens slippers</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
  
<style>
  .selected {
      background-color: #000;
      color: #fff;
    }
    .size-buttons button.selected {
      background-color: black;
      color: white;
    }
    </style>
<h1>Women's Footwear</h1>
<div class="product-card" data-name="Versace black leather slippers" data-price="11999" data-image="https://di2ponv0v5otw.cloudfront.net/posts/2022/02/28/621d3f08ffba9468e9243980/m_wp_621d3f2dac97024a56e33615.webp">
  <div class="product-image">
    <img src="https://di2ponv0v5otw.cloudfront.net/posts/2022/02/28/621d3f08ffba9468e9243980/m_wp_621d3f2dac97024a56e33615.webp" alt="Versace black leather slippers">
  </div>
  <div class="product-details">
    <div class="product-name">Versace black leather slippers</div>
    <div class="product-price">₹11999</div>
    <div class="product-reviews">
      <h2>Rating: <i class='bx bxs-star'></i> 4.9</h2>
      <div class="size-buttons">
        <button class="size-btn">7</button>
        <button class="size-btn">8</button>
        <button class="size-btn">9</button>
        <button class="size-btn">10</button>
      </div>
      <button class="add-btn">Add to cart</button>
    </div>
  </div>
</div>

<div class="product-card" data-name="Dior black slippers" data-price="15999" data-image="https://cdn-img.poizonapp.com/pro-img/cut-img/20230908/ea1943108611474eb8fbf946fe4f3098.jpg?x-oss-process=image/format,webp/resize,w_800,h_800">
  <div class="product-image">
    <img src="https://cdn-img.poizonapp.com/pro-img/cut-img/20230908/ea1943108611474eb8fbf946fe4f3098.jpg?x-oss-process=image/format,webp/resize,w_800,h_800" alt="Dior Black slippers">
  </div>
  <div class="product-details">
    <div class="product-name">Dior black slippers</div>
    <div class="product-price">₹15999</div>
    <div class="product-reviews">
      <h2>Rating: <i class='bx bxs-star'></i> 4.1</h2>
      <div class="size-buttons">
        <button class="size-btn">7</button>
        <button class="size-btn">8</button>
        <button class="size-btn">9</button>
        <button class="size-btn">10</button>
      </div>
      <button class="add-btn">Add to cart</button>
    </div>
  </div>
</div>

<div class="product-card" data-name="Chanel all black slippers" data-price="12999" data-image="https://luxurypromise.com/cdn/shop/files/chanel-footwear-chanel-slippers-black-40-asc4872-37800564228252.jpg?v=1715364974&width=2048">
  <div class="product-image">
    <img src="https://luxurypromise.com/cdn/shop/files/chanel-footwear-chanel-slippers-black-40-asc4872-37800564228252.jpg?v=1715364974&width=2048" alt="Chanel all black slippers">
  </div>
  <div class="product-details">
    <div class="product-name">Chanel all black slippers</div>
    <div class="product-price">₹12999</div>
    <div class="product-reviews">
      <h2>Rating: <i class='bx bxs-star'></i> 4.3</h2>
      <div class="size-buttons">
        <button class="size-btn">7</button>
        <button class="size-btn">8</button>
        <button class="size-btn">9</button>
        <button class="size-btn">10</button>
      </div>
      <button class="add-btn">Add to cart</button>
    </div>
  </div>
</div>

<script>
  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  document.querySelectorAll('.add-btn').forEach(button => {
    button.addEventListener('click', () => {
      const card = button.closest('.product-card');
      const name = card.getAttribute('data-name');
      const price = parseFloat(card.getAttribute('data-price'));
      const image = card.getAttribute('data-image');
      const selectedSize = card.querySelector('.size-btn.selected');

      if (!selectedSize) {
        alert("Please select a size before adding to cart.");
        return;
      }

      const size = selectedSize.textContent;
      const product = { name, price, image, size, quantity: 1 };

      const existingItem = cart.find(item => item.name === name && item.size === size);
      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        cart.push(product);
      }

      localStorage.setItem('cart', JSON.stringify(cart));
      alert(`${name} (Size ${size}) added to cart!`);
    });
  });

  document.querySelectorAll('.size-buttons').forEach(group => {
    const buttons = group.querySelectorAll('.size-btn');
    buttons.forEach(button => {
      button.addEventListener('click', () => {
        if (button.classList.contains('selected')) {
          button.classList.remove('selected');
        } else {
          buttons.forEach(btn => btn.classList.remove('selected'));
          button.classList.add('selected');
        }
      });
    });
  });
</script>
</body>
</html>
