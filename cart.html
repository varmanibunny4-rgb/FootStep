<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    padding-top: 50px;
    padding-right: 20px;
    background-image: url('https://i.pinimg.com/originals/5a/d0/47/5ad047a18772cf0488a908d98942f9bf.gif');
    background-size:auto;
    background-repeat: no-repeat;
    background-position:top;

    color: #fff; /* Make text readable on dark image */
  }

  .cart-item {
    background-color: rgba(0, 0, 0, 0.5); /* semi-transparent background */
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 15px;


  }

  .back-home{
    width: 10%;
    text-decoration: none;
    text-align: center;

  }
  .cart-item img {
    width: 60px;
    height: 60px;
    object-fit: cover;
  }

  .quantity-controls button,
  .checkout-btn,
  .back-home {
    background-color: #000;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
  }

  .checkout-btn:hover,
  .back-home:hover {
    background-color: #444;
  }

  .total {
    font-size: 1.2rem;
    margin-top: 20px;
    background-color: rgba(0, 0, 0, 0.6);
    padding: 10px;
    border-radius: 5px;
    display: inline-block;
  }

  .back-home, .checkout-btn {
    margin-right: 10px;
    display: grid;
    margin-top: 15px;
  }
</style>
</head>
<body>
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <p class="total">Total: ₹<span id="cart-total">0</span></p>

  <button class="checkout-btn" onclick="checkout()">Checkout</button>

  <a href="home.html" class="back-home">Return to Home</a>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function renderCart() {
      const cartItemsContainer = document.getElementById('cart-items');
      cartItemsContainer.innerHTML = '';
      let total = 0;

      cart.forEach((item, index) => {
        total += item.price * item.quantity;
        const li = document.createElement('li');
        li.classList.add('cart-item');
        li.innerHTML = `
          <div>
            <img src="${item.image}" alt="${item.name}">
            <strong>${item.name}</strong><br>
            ₹${item.price} x ${item.quantity}
          </div>
          <div class="quantity-controls">
            <button onclick="changeQuantity(${index}, -1)">-</button>
            <span>${item.quantity}</span>
            <button onclick="changeQuantity(${index}, 1)">+</button>
          </div>
        `;
        cartItemsContainer.appendChild(li);
      });

      document.getElementById('cart-total').textContent = total.toFixed(2);
    }

    function changeQuantity(index, delta) {
      cart[index].quantity += delta;
      if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    renderCart();


    /*check out section*/

    function checkout() {
  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }

  alert("Thank you for ordering 😊..! Your order will dispatch soon🚚 .");
  cart = [];
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}
  </script>
</body>
</html>
